server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: rag
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: jdbc:mysql://localhost:3306/rag?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: rag123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-v3}
    vectorstore:
      milvus:
        client:
          host: localhost
          port: 19530
        database-name: default
        collection-name: rag_vectors
        embedding-dimension: ${EMBEDDING_DIMENSION:1024}

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: rag-documents

# JWT 配置
jwt:
  secret: rag-secret-key-please-change-in-production-environment
  expiration: 86400000

# 日志配置
logging:
  level:
    com.rag: DEBUG
    org.springframework.ai: INFO
